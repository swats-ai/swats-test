<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Site — SWATS SXSW Challenge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hero { text-align: center; padding: 2rem; max-width: 600px; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; background: linear-gradient(135deg, #00d4ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.2rem; color: #aaa; margin-bottom: 2rem; line-height: 1.6; }
        .badge { display: inline-block; padding: 0.5rem 1.5rem; border: 1px solid #333; border-radius: 50px; font-size: 0.9rem; color: #666; }
        .footer { position: fixed; bottom: 1rem; text-align: center; font-size: 0.75rem; color: #444; }
        .footer img { height: 14px; filter: brightness(0) invert(1); opacity: 0.7; position: relative; top: -2px; margin: 0 4px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🚀 It Works!</h1>
        <p>This is a test site deployed to a SWATS subdomain during SXSW 2026. If you can see this, the pipeline is live.</p>
        <div class="badge">Built by AI in seconds</div>
    </div>
    <div class="footer">
        Powered by <img src="https://swats.ai/minero-logo.png" alt="Minero"> + 🤖
    </div>
</body>
</html>
